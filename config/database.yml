# PostgreSQL configuration. Defaults are tuned for the bundled
# docker-compose.yml — set DATABASE_URL in your .env to override.
#
# pool: with SOLID_QUEUE_IN_PUMA=true the recurring scheduler + workers share
# the web process, so the pool must cover Puma threads (RAILS_MAX_THREADS)
# plus Solid Queue threads (≈ 5 from queue.yml) plus Action Cable + cache.
# Decoupled from RAILS_MAX_THREADS so Puma can stay small while the pool
# stays large enough for the queue.

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL") { ENV.fetch("RAILS_MAX_THREADS", 5).to_i + 5 } %>

development:
  <<: *default
  database: errsight_community_development
  url: <%= ENV["DATABASE_URL"] %>

# Test data is wiped between runs, so don't share with development.
test:
  <<: *default
  database: errsight_community_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
