default: &default
  store_options:
    # Cap the cache table at ~256MB. Solid Cache trims the oldest entries
    # in the background when this is exceeded. Bump only when alert/dedup
    # cardinality justifies it — overage notifications, alert debounces,
    # and cleanup-gate keys are tiny and rotate quickly.
    max_size: <%= 256.megabytes %>
    # Per-env namespace so a stray dev/test write can't collide with a
    # production key if we ever point them at the same database.
    namespace: <%= Rails.env %>

# Solid Cache uses the primary database connection by default (no
# `database:` key). We deliberately do NOT add a separate `cache:`
# connection in database.yml — the cache table lives in the primary
# database alongside everything else, and a dedicated pool would just
# burn Postgres connection slots on Railway for negligible benefit at
# this scale. Revisit if cache traffic ever rivals web traffic.
development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
